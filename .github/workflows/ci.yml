name: CI

on:
  push:
    branches: [master, main, dev-beta]
  pull_request:
    branches: [master, main, dev-beta]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Guard — no secrets / private code in the public repo
        run: node scripts/check-no-secrets.js

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile && npm run copy-webview

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test

      - name: Verify adapter sync
        run: npm run adapters:check
